<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>onmode.life · 追蹤我們</title>
<meta name="description" content="onmode.life — LINE / Instagram / TikTok 一頁式連結頁" />

<!-- 分享預覽（貼到 LINE / IG / FB 時顯示） -->
<meta property="og:title" content="onmode.life" />
<meta property="og:description" content="在這裡追蹤我們 ✨ LINE · Instagram · TikTok" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />

<style>
  /* =========================================================
     可編輯區：要改文字 / 連結，找 index.html 裡的 <main> 即可
     換頭像：把一張正方形照片命名為 avatar.jpg 放在同一資料夾
     ========================================================= */
  :root{
    --ig1:#feda75; --ig2:#fa7e1e; --ig3:#d62976; --ig4:#962fbf; --ig5:#4f5bd5;
    --ink:#15131a;
    --muted:#6b6776;
    --card:rgba(255,255,255,.72);
    --card-border:rgba(255,255,255,.65);
    --shadow:0 18px 50px -18px rgba(70,30,110,.45);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100svh;
    font-family:"Noto Sans TC","Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 12% -8%, rgba(254,218,117,.55), transparent 55%),
      radial-gradient(1000px 700px at 100% 0%, rgba(214,41,118,.45), transparent 55%),
      radial-gradient(1100px 800px at 50% 120%, rgba(79,91,213,.5), transparent 55%),
      linear-gradient(160deg,#fff4f7 0%, #f6f0ff 45%, #eef2ff 100%);
    background-attachment:fixed;
    display:flex; flex-direction:column; align-items:center;
    padding:max(28px,env(safe-area-inset-top)) 18px max(40px,env(safe-area-inset-bottom));
  }

  /* 柔光氣泡背景 */
  .blob{ position:fixed; inset:auto; border-radius:50%; filter:blur(60px); opacity:.45; z-index:0; pointer-events:none; }
  .blob.a{ width:280px;height:280px; top:-60px; left:-70px; background:linear-gradient(var(--ig1),var(--ig2)); }
  .blob.b{ width:320px;height:320px; bottom:-90px; right:-80px; background:linear-gradient(var(--ig3),var(--ig5)); }

  main{
    position:relative; z-index:1;
    width:100%; max-width:440px;
    margin:auto 0;
    display:flex; flex-direction:column; align-items:center;
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;} }

  /* 頭像 */
  .avatar{
    width:108px;height:108px;border-radius:50%;
    padding:4px;
    background:conic-gradient(from 210deg,var(--ig1),var(--ig2),var(--ig3),var(--ig4),var(--ig5),var(--ig1));
    box-shadow:var(--shadow);
    margin-bottom:16px;
  }
  .avatar .inner{
    width:100%;height:100%;border-radius:50%;
    background:#fff; padding:3px; overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .avatar img{ width:100%;height:100%;object-fit:cover;border-radius:50%; display:block; }
  .avatar .mono{
    width:100%;height:100%;border-radius:50%;
    display:none; align-items:center;justify-content:center;
    font-family:"Inter",sans-serif; font-weight:800; font-size:34px; letter-spacing:.5px; color:#fff;
    background:conic-gradient(from 210deg,var(--ig2),var(--ig3),var(--ig4),var(--ig5));
  }

  .handle{ font-family:"Inter",sans-serif; font-weight:800; font-size:22px; letter-spacing:.2px; margin:2px 0 4px; }
  .bio{ color:var(--muted); font-size:15px; font-weight:500; text-align:center; line-height:1.5; margin:0 0 22px; }

  .links{ width:100%; display:flex; flex-direction:column; gap:13px; }

  .btn{
    --accent:#000;
    position:relative; display:flex; align-items:center; gap:14px;
    width:100%; padding:15px 18px;
    text-decoration:none; color:var(--ink);
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:18px;
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 8px 24px -14px rgba(40,20,70,.4);
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
    overflow:hidden;
  }
  .btn::before{ /* 左側品牌色條 */
    content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent);
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 16px 32px -16px rgba(40,20,70,.5); background:rgba(255,255,255,.85); }
  .btn:active{ transform:translateY(0) scale(.99); }

  .icon{
    flex:0 0 46px; width:46px;height:46px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    background:var(--accent); color:#fff;
  }
  .icon svg{ width:24px;height:24px; fill:currentColor; }
  .btn.line   { --accent:#06C755; }
  .btn.ig     .icon{ background:linear-gradient(45deg,var(--ig1),var(--ig2) 25%,var(--ig3) 55%,var(--ig4) 78%,var(--ig5)); }
  .btn.ig     { --accent:#d62976; }
  .btn.tiktok { --accent:#010101; }

  .label{ display:flex;flex-direction:column; line-height:1.25; min-width:0; }
  .label .t{ font-weight:700; font-size:16px; }
  .label .s{ font-size:13px; color:var(--muted); font-weight:500; }

  .chev{ margin-left:auto; flex:0 0 auto; color:var(--muted); opacity:.6; transition:transform .15s ease, opacity .2s ease; }
  .btn:hover .chev{ transform:translateX(3px); opacity:1; }

  footer{ position:relative; z-index:1; margin-top:30px; color:var(--muted); font-size:12px; opacity:.8; text-align:center; }

  @media (prefers-color-scheme: dark){
    :root{ --ink:#f4f1fa; --muted:#b3adc2; --card:rgba(32,28,42,.62); --card-border:rgba(255,255,255,.12); }
    body{
      background:
        radial-gradient(1200px 600px at 12% -8%, rgba(214,41,118,.35), transparent 55%),
        radial-gradient(1000px 700px at 100% 0%, rgba(79,91,213,.4), transparent 55%),
        linear-gradient(160deg,#15121d 0%, #181527 55%, #120f1c 100%);
    }
    .avatar .inner{ background:#1b1826; }
    .btn:hover{ background:rgba(45,40,60,.82); }
  }
</style>
</head>
