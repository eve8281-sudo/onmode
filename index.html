<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  /* =========================================================
     ONMODE link page — 暗色聚光 / 清單式
     改文字 / 連結：找下方 <nav class="links"> 區塊
     ========================================================= */
  :root{
    --bg:#000;
    --title:#f4f1ec;
    --ink:#ece8e1;
    --tan:#9c9183;          /* LIFE ON MODE 暖灰 */
    --muted:#8a857d;        /* 斜體說明 */
    --faint:#5b574f;        /* 版權/細線文字 */
    --line:rgba(255,255,255,.08);
    --icon:rgba(236,232,225,.82);
    --serif:"Cormorant Garamond",serif;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); }
  body{
    min-height:100svh;
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(680px 360px at 50% 2%, rgba(232,226,214,.14), rgba(0,0,0,0) 60%),
      radial-gradient(520px 300px at 50% 0%, rgba(255,252,245,.07), rgba(0,0,0,0) 58%),
      #000;
    display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  main{
    width:100%; max-width:440px; min-height:100svh;
    padding:0 30px;
    padding-bottom:max(26px,env(safe-area-inset-bottom));
    display:flex; flex-direction:column;
    animation:fade .9s ease both;
  }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ---- HERO ---- */
  .hero{ text-align:center; padding-top:13svh; }
  .wordmark{
    margin:0; line-height:1; color:var(--title);
    font-family:var(--serif); font-weight:300;
    font-size:clamp(44px,14.5vw,70px);
    letter-spacing:.16em; text-indent:.16em; /* 補償字距尾端空白與側白邊，使可見字形置中 */
    white-space:nowrap;
  }
  .sub{
    margin-top:18px;
    font-family:var(--sans); font-weight:400;
    font-size:clamp(10px,2.7vw,12px);
    letter-spacing:.46em; text-indent:.23em; color:var(--tan);
  }
  .rule{ width:48px; height:1px; background:rgba(255,255,255,.2); margin:22px auto 0; }

  /* ---- LINKS ---- */
  .links{ margin-top:12svh; display:flex; flex-direction:column; }

  .row{
    display:flex; align-items:center; gap:22px;
    padding:23px 2px;
    border-top:1px solid var(--line);
    text-decoration:none; color:inherit;
    transition:background .25s ease, padding-left .2s ease;
  }
  .row:last-child{ border-bottom:1px solid var(--line); }
  .row:hover{ background:rgba(255,255,255,.022); padding-left:6px; }

  .ic{ flex:0 0 30px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:var(--icon); transition:color .25s ease; }
  .ic svg{ width:26px; height:26px; }
  .row:hover .ic{ color:#fff; }

  .meta{ display:flex; flex-direction:column; gap:6px; min-width:0; }
  .t{
    font-family:var(--sans); font-weight:400; font-size:16px;
    letter-spacing:.14em; color:var(--ink);
  }
  .d{
    font-family:var(--serif); font-style:italic; font-weight:400;
    font-size:16px; color:var(--muted); letter-spacing:.01em; line-height:1;
  }

  footer{
    margin-top:30px; padding:22px 0 8px; text-align:center;
    font-family:var(--sans); font-weight:400;
    font-size:clamp(8.5px,2.5vw,10px);
    letter-spacing:.16em; color:var(--faint); white-space:nowrap;
  }
</style>
</head>
